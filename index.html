<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ローマ字タイピング</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨️</text></svg>">
<link rel="stylesheet" href="shared/typing-ui.css?v=202606281323">
<script>
(function(){
  var BUILD='202606281323';
  try{
    fetch('shared/build.txt',{cache:'no-store'}).then(function(r){return r.text();}).then(function(t){
      t=(t||'').trim();
      if(t && t>BUILD && !sessionStorage.getItem('rt_reload_'+t)){
        sessionStorage.setItem('rt_reload_'+t,'1');
        location.replace(location.pathname+(location.search?location.search+'&':'?')+'_v='+t);
      }
    }).catch(function(){});
  }catch(e){}
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>ローマ字タイピング</h1>
  </div>

  <!-- 称号バッジ -->
  <div class="badge-stage" id="stageBadge">
    <div style="flex:1">
      <div class="nm" id="stageName">タイピング 10きゅう</div>
      <div class="bar"><i id="stageBar" style="width:0%"></i></div>
      <div class="muted" id="stageNext" style="font-size:.78rem;margin-top:3px"></div>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <h2 style="margin:22px 0 12px;font-size:1.15rem">レベルをえらぼう</h2>
  <div class="stages" id="stages"></div>

  <!-- 図鑑 -->
  <h2 style="margin:26px 0 8px;font-size:1.15rem">かな図鑑</h2>
  <div class="card"><div class="dex" id="dex"></div></div>

  <!-- メダル -->
  <h2 style="margin:26px 0 8px;font-size:1.15rem">メダル <span class="muted" id="medalCnt" style="font-size:.9rem"></span></h2>
  <div class="card"><div class="medals" id="medals"></div></div>
</div>

<script src="shared/lessons.js?v=202606281323"></script>
<script src="shared/typing-core.js?v=202606281323"></script>
<script>
(function(){
  var C = TypingCore;

  /* テスト用：全レベル解放（鍵なし）。あとで鍵付きに戻すときは false にするだけ。 */
  var UNLOCK_ALL = true;

  /* 称号 */
  var st = C.stage();
  document.getElementById('stageName').textContent = st.cur.name;
  if(st.next){
    var span = st.next.at - st.cur.at, got = st.value - st.cur.at;
    document.getElementById('stageBar').style.width = Math.min(100, got/span*100)+'%';
    document.getElementById('stageNext').textContent = 'つぎの称号まで あと '+(st.next.at-st.value)+' もじ';
  } else {
    document.getElementById('stageBar').style.width='100%';
    document.getElementById('stageNext').textContent = 'さいこうランク！';
  }

  /* サマリー */
  var s = C.store();
  var cells = [
    {n:s.totalChars||0, l:'打ったかな'},
    {n:(s.bestKpm||0), l:'さいこうの はやさ'},
    {n:(s.bestCombo||0), l:'れんぞく'},
    {n:C.dexCount()+'/'+C.dexTotal, l:'かな図鑑'},
    {n:C.medalCount()+'/'+C.MEDALS.length, l:'メダル'},
    {n:s.plays||0, l:'あそんだ回数'},
  ];
  document.getElementById('summary').innerHTML = cells.map(function(c){
    return '<div class="sumcell"><div class="n">'+c.n+'</div><div class="l">'+c.l+'</div></div>';
  }).join('');

  /* ステージ一覧 */
  var html='';
  LESSONS.forEach(function(l, i){
    var locked = !UNLOCK_ALL && l.unlock && !C.isCleared(l.unlock);
    var cleared = C.isCleared(l.id);
    var lvNum = 'Lv'+i;
    if(locked){
      var need = lessonById(l.unlock);
      html += '<div class="stage locked"><span class="lv">'+lvNum+'</span>'+
        '<div class="ti">'+l.title+'</div><div class="de">'+l.desc+'</div>'+
        '<div class="lockmsg">「'+(need?need.title:'')+'」をクリアでひらく</div></div>';
    } else {
      html += '<a class="stage" href="play/index.html?lv='+l.id+'"><span class="lv">'+lvNum+'</span>'+
        (cleared?'<span class="done" style="left:12px;right:auto;font-size:.8rem;color:var(--accent2);font-weight:800">クリア</span>':'')+
        '<div class="ti">'+l.title+'</div>'+
        '<div class="de">'+l.desc+'</div></a>';
    }
  });
  document.getElementById('stages').innerHTML = html;

  /* かな図鑑 */
  var dexHtml = C.DEX.map(function(k){
    var n = C.kanaCount(k);
    var cls = n>=5 ? 'master' : (n>=1 ? 'got' : '');
    return '<div class="c '+cls+'">'+k+'</div>';
  }).join('');
  document.getElementById('dex').innerHTML = dexHtml;

  /* メダル */
  var got = s.medals||{};
  document.getElementById('medals').innerHTML = C.MEDALS.map(function(m){
    var on = !!got[m.id];
    return '<div class="medal'+(on?'':' off')+'"><div class="e">'+m.emoji+'</div><div class="n">'+m.name+'</div></div>';
  }).join('');
  document.getElementById('medalCnt').textContent = '('+C.medalCount()+'/'+C.MEDALS.length+')';
})();
</script>
</body>
</html>
