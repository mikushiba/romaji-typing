<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>гғӯгғјгғһеӯ—гӮҝгӮӨгғ”гғігӮ°</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>вҢЁпёҸ</text></svg>">
<link rel="stylesheet" href="shared/typing-ui.css?v=202606281409">
<script>
(function(){
  var BUILD='202606281409';
  try{
    fetch('shared/build.txt',{cache:'no-store'}).then(function(r){return r.text();}).then(function(t){
      t=(t||'').trim();
      if(t && t>BUILD && !sessionStorage.getItem('rt_reload_'+t)){
        sessionStorage.setItem('rt_reload_'+t,'1');
        location.replace(location.pathname+(location.search?location.search+'&':'?')+'_v='+t);
      }
    }).catch(function(){});
  }catch(e){}
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>гғӯгғјгғһеӯ—гӮҝгӮӨгғ”гғігӮ°</h1>
  </div>

  <!-- з§°еҸ·гғҗгғғгӮё -->
  <div class="badge-stage" id="stageBadge">
    <div style="flex:1">
      <div class="nm" id="stageName">гӮҝгӮӨгғ”гғігӮ° 10гҒҚгӮ…гҒҶ</div>
      <div class="bar"><i id="stageBar" style="width:0%"></i></div>
      <div class="muted" id="stageNext" style="font-size:.78rem;margin-top:3px"></div>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <h2 style="margin:22px 0 12px;font-size:1.15rem">гӮІгғјгғ гӮ’ гҒҲгӮүгҒјгҒҶ</h2>
  <div class="stages" id="stages"></div>

  <!-- гҒӢгҒӘеӣій‘‘гғ»гғЎгғҖгғ«гҒҜгғңгӮҝгғігҒ§й–ӢгҒҸ -->
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:26px 0 8px">
    <button class="btn green" id="openDex">гҒӢгҒӘеӣій‘‘гӮ’гҒҝгӮӢ</button>
    <button class="btn" id="openMedals">гғЎгғҖгғ«гӮ’гҒҝгӮӢ</button>
  </div>
</div>

<!-- гғўгғјгғҖгғ«пјҡгҒӢгҒӘеӣій‘‘ -->
<div class="modal-bg" id="dexModal">
  <div class="modal">
    <button class="modal-close" id="dexClose" aria-label="гҒЁгҒҳгӮӢ">Г—</button>
    <h3>гҒӢгҒӘеӣій‘‘ <span class="muted" id="dexCnt" style="font-size:.85rem"></span></h3>
    <p class="muted" style="margin:0 0 10px;font-size:.85rem">жү“гҒҰгҒҹгҒӢгҒӘгҒҢ гҒ„гӮҚгҒҘгҒҸгӮҲгҖӮ5гҒӢгҒ„гҒ§ вҳ…гғһгӮ№гӮҝгғјгҖӮ</p>
    <div class="dex" id="dex"></div>
  </div>
</div>

<!-- гғўгғјгғҖгғ«пјҡгғЎгғҖгғ« -->
<div class="modal-bg" id="medalModal">
  <div class="modal">
    <button class="modal-close" id="medalClose" aria-label="гҒЁгҒҳгӮӢ">Г—</button>
    <h3>гғЎгғҖгғ« <span class="muted" id="medalCnt" style="font-size:.85rem"></span></h3>
    <div class="medals" id="medals"></div>
  </div>
</div>

<script src="shared/lessons.js?v=202606281409"></script>
<script src="shared/typing-core.js?v=202606281409"></script>
<script>
(function(){
  var C = TypingCore;

  /* гғҶгӮ№гғҲз”Ёпјҡе…Ёгғ¬гғҷгғ«и§Јж”ҫпјҲйҚөгҒӘгҒ—пјүгҖӮгҒӮгҒЁгҒ§йҚөд»ҳгҒҚгҒ«жҲ»гҒҷгҒЁгҒҚгҒҜ false гҒ«гҒҷгӮӢгҒ гҒ‘гҖӮ */
  var UNLOCK_ALL = true;

  /* з§°еҸ· */
  var st = C.stage();
  document.getElementById('stageName').textContent = st.cur.name;
  if(st.next){
    var span = st.next.at - st.cur.at, got = st.value - st.cur.at;
    document.getElementById('stageBar').style.width = Math.min(100, got/span*100)+'%';
    document.getElementById('stageNext').textContent = 'гҒӨгҒҺгҒ®з§°еҸ·гҒҫгҒ§ гҒӮгҒЁ '+(st.next.at-st.value)+' гӮӮгҒҳ';
  } else {
    document.getElementById('stageBar').style.width='100%';
    document.getElementById('stageNext').textContent = 'гҒ•гҒ„гҒ“гҒҶгғ©гғігӮҜпјҒ';
  }

  /* гӮ«гғ©гғјгғ‘гғ¬гғғгғҲпјҲз®—ж•°гғ»жјўеӯ—гӮўгғ—гғӘгҒ®гӮҲгҒҶгҒ«гӮ«гғ©гғ•гғ«гҒ«пјү */
  var CARD_BG  = ['#ffe1e6','#ffeacf','#fff6c2','#d9f5d6','#d2edfb','#dee2ff','#ece0ff','#ffe0f0'];
  var ACCENT   = ['#ef6d83','#f59331','#dca900','#3fbf6f','#3b9ae0','#5b73e8','#8b5cf6','#e25aa6'];

  /* гӮөгғһгғӘгғј */
  var s = C.store();
  var cells = [
    {n:s.totalChars||0, l:'жү“гҒЈгҒҹгҒӢгҒӘ'},
    {n:(s.bestKpm||0), l:'гҒ•гҒ„гҒ“гҒҶгҒ® гҒҜгӮ„гҒ•'},
    {n:(s.bestCombo||0), l:'гӮҢгӮ“гҒһгҒҸ'},
    {n:C.dexCount()+'/'+C.dexTotal, l:'гҒӢгҒӘеӣій‘‘'},
    {n:C.medalCount()+'/'+C.MEDALS.length, l:'гғЎгғҖгғ«'},
    {n:s.plays||0, l:'гҒӮгҒқгӮ“гҒ еӣһж•°'},
  ];
  document.getElementById('summary').innerHTML = cells.map(function(c,i){
    return '<div class="sumcell" style="background:'+CARD_BG[i]+';border-color:'+ACCENT[i]+'55">'+
      '<div class="n" style="color:'+ACCENT[i]+'">'+c.n+'</div><div class="l">'+c.l+'</div></div>';
  }).join('');

  /* гӮ№гғҶгғјгӮёдёҖиҰ§ */
  var html='';
  LESSONS.forEach(function(l, i){
    var locked = !UNLOCK_ALL && l.unlock && !C.isCleared(l.unlock);
    var cleared = C.isCleared(l.id);
    // гӮҖгҒҡгҒӢгҒ—гҒ•пјҲгӮ„гҒ•гҒ—гҒ„/гҒөгҒӨгҒҶ/гӮҖгҒҡгҒӢгҒ—гҒ„пјүгҒЁ дҝЎеҸ·иүІ
    var tier = i<=2 ? 'гӮ„гҒ•гҒ—гҒ„' : (i<=5 ? 'гҒөгҒӨгҒҶ' : 'гӮҖгҒҡгҒӢгҒ—гҒ„');
    var tierColor = i<=2 ? '#3fbf6f' : (i<=5 ? '#f59331' : '#ef5350');
    var lvrow = 'display:flex;align-items:center;gap:8px;margin-bottom:6px';
    if(locked){
      var need = lessonById(l.unlock);
      html += '<div class="stage locked">'+
        '<div style="'+lvrow+'"><span class="lv" style="position:static;background:'+tierColor+';color:#fff">'+tier+'</span></div>'+
        '<div class="ti">'+l.title+'</div><div class="de">'+l.desc+'</div>'+
        '<div class="lockmsg">гҖҢ'+(need?need.title:'')+'гҖҚгӮ’гӮҜгғӘгӮўгҒ§гҒІгӮүгҒҸ</div></div>';
    } else {
      var bg=CARD_BG[i%CARD_BG.length], ac=ACCENT[i%ACCENT.length];
      html += '<a class="stage" href="play/index.html?lv='+l.id+'" style="background:'+bg+';border-color:'+ac+'">'+
        '<div style="'+lvrow+'"><span class="lv" style="position:static;background:'+tierColor+';color:#fff">'+tier+'</span></div>'+
        '<div class="ti" style="color:'+ac+'">'+l.title+'</div>'+
        '<div class="de">'+l.desc+'</div></a>';
    }
  });
  document.getElementById('stages').innerHTML = html;

  /* гҒӢгҒӘеӣій‘‘ */
  var dexHtml = C.DEX.map(function(k){
    var n = C.kanaCount(k);
    var cls = n>=5 ? 'master' : (n>=1 ? 'got' : '');
    return '<div class="c '+cls+'">'+k+'</div>';
  }).join('');
  document.getElementById('dex').innerHTML = dexHtml;
  document.getElementById('dexCnt').textContent = '('+C.dexCount()+'/'+C.dexTotal+'гғ»вҳ…'+C.dexMaster()+')';

  /* гғЎгғҖгғ« */
  var got = s.medals||{};
  document.getElementById('medals').innerHTML = C.MEDALS.map(function(m){
    var on = !!got[m.id];
    return '<div class="medal'+(on?'':' off')+'"><div class="e">'+m.emoji+'</div><div class="n">'+m.name+'</div></div>';
  }).join('');
  document.getElementById('medalCnt').textContent = '('+C.medalCount()+'/'+C.MEDALS.length+')';

  /* гғўгғјгғҖгғ«гҒ®й–Ӣй–ү */
  function openModal(id){ document.getElementById(id).classList.add('show'); }
  function closeModal(id){ document.getElementById(id).classList.remove('show'); }
  document.getElementById('openDex').onclick = function(){ openModal('dexModal'); };
  document.getElementById('openMedals').onclick = function(){ openModal('medalModal'); };
  document.getElementById('dexClose').onclick = function(){ closeModal('dexModal'); };
  document.getElementById('medalClose').onclick = function(){ closeModal('medalModal'); };
  // иғҢжҷҜгӮҜгғӘгғғгӮҜгҒ§гҒЁгҒҳгӮӢ
  ['dexModal','medalModal'].forEach(function(id){
    document.getElementById(id).addEventListener('click', function(e){ if(e.target===this) closeModal(id); });
  });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeModal('dexModal'); closeModal('medalModal'); } });
})();
</script>
</body>
</html>
